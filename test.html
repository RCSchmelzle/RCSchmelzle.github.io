<!DOCTYPE html>
<html>
<head><title>Node Animation Test</title></head>
<body style="margin:0; background:#f5f5f5;">
<canvas id="c" style="position:fixed;top:0;left:0;"></canvas>
<div style="position:relative;z-index:1;max-width:600px;margin:60px auto;background:#fff;padding:40px;border:1px solid #ddd;">
  <h1>Content on top</h1>
  <p>The wireframe nodes should be visible in the background around this white box.</p>
</div>
<script>
var c = document.getElementById('c');
var ctx = c.getContext('2d');
var w, h;
var nodes = [];

function resize() {
  w = c.width = window.innerWidth;
  h = c.height = window.innerHeight;
}
resize();
window.addEventListener('resize', resize);

for (var i = 0; i < 50; i++) {
  nodes.push({
    x: Math.random() * w,
    y: Math.random() * h,
    vx: (Math.random() - 0.5) * 0.3,
    vy: (Math.random() - 0.5) * 0.3,
    r: Math.random() * 2 + 1.5
  });
}

function draw() {
  ctx.clearRect(0, 0, w, h);

  for (var i = 0; i < nodes.length; i++) {
    nodes[i].x += nodes[i].vx;
    nodes[i].y += nodes[i].vy;
    if (nodes[i].x < 0 || nodes[i].x > w) nodes[i].vx *= -1;
    if (nodes[i].y < 0 || nodes[i].y > h) nodes[i].vy *= -1;
  }

  for (var i = 0; i < nodes.length; i++) {
    for (var j = i + 1; j < nodes.length; j++) {
      var dx = nodes[i].x - nodes[j].x;
      var dy = nodes[i].y - nodes[j].y;
      var dist = Math.sqrt(dx*dx + dy*dy);
      if (dist < 170) {
        ctx.beginPath();
        ctx.moveTo(nodes[i].x, nodes[i].y);
        ctx.lineTo(nodes[j].x, nodes[j].y);
        ctx.strokeStyle = 'rgba(140,155,175,' + (0.2 * (1 - dist/170)) + ')';
        ctx.lineWidth = 0.8;
        ctx.stroke();
      }
    }
  }

  for (var i = 0; i < nodes.length; i++) {
    ctx.beginPath();
    ctx.arc(nodes[i].x, nodes[i].y, nodes[i].r, 0, Math.PI*2);
    ctx.fillStyle = 'rgba(140,155,175,0.3)';
    ctx.fill();
  }

  requestAnimationFrame(draw);
}
draw();
</script>
</body>
</html>
